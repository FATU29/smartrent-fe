sonar.projectKey=REPLACE_WITH_PROJECT_KEY
sonar.organization=REPLACE_WITH_ORG

# ──────────────────────────────────────────────
# Sources
# ──────────────────────────────────────────────
sonar.sources=src
sonar.sourceEncoding=UTF-8

# ──────────────────────────────────────────────
# Quality Gate — informational only.
# CI status reflects build/test/lint only; Sonar never blocks merges.
# Flip to `true` once tests + coverage land and the team commits to the gate.
# ──────────────────────────────────────────────
sonar.qualitygate.wait=false

# Scope the gate to *new* code only so legacy code never blocks the gate.
sonar.newCode.referenceBranch=main

# ──────────────────────────────────────────────
# JavaScript/TypeScript runtime hints
# ──────────────────────────────────────────────
sonar.javascript.environments=browser,node,jest
sonar.javascript.node.maxspace=8192

# ──────────────────────────────────────────────
# Analysis exclusions — files completely ignored by SonarCloud
# Anything excluded here contributes 0 issues, 0 duplications, 0 coverage.
# ──────────────────────────────────────────────
sonar.exclusions=\
  **/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__tests__/**,**/__mocks__/**,\
  **/*.d.ts,\
  **/*.stories.ts,**/*.stories.tsx,**/*storybook*/**,\
  **/*.config.js,**/*.config.mjs,**/*.config.ts,\
  next.config.ts,postcss.config.mjs,tailwind.config.js,vitest.config.ts,eslint.config.mjs,\
  .next/**,build/**,dist/**,coverage/**,\
  node_modules/**,\
  scripts/**,\
  src/constants/**,\
  src/mock/**,\
  src/messages/**,\
  src/examples/**,\
  src/test/**,\
  src/types/**,\
  src/theme/**,\
  src/styles/**,\
  src/api/types/**,\
  src/components/atoms/icons/**,\
  src/components/ui/**,\
  **/index.colors.tsx,\
  **/*.constants.ts,**/*.constants.tsx,\
  public/**

# ──────────────────────────────────────────────
# Copy-Paste Detection (CPD) exclusions
# Repetitive structures (data tables, parallel form sections, type definitions,
# Radix/shadcn UI primitives) are NOT copy-paste bugs.
# ──────────────────────────────────────────────
sonar.cpd.exclusions=\
  **/constants/**,\
  src/mock/**,\
  src/messages/**,\
  src/examples/**,\
  src/api/**,\
  src/components/ui/**,\
  src/components/atoms/**,\
  src/components/templates/**,\
  **/createPostSections/**,\
  **/updatePostSections/**,\
  **/*.constants.ts,**/*.constants.tsx,\
  **/index.colors.tsx,\
  **/*.styles.ts,**/*.styles.tsx

# ──────────────────────────────────────────────
# Coverage — disabled until unit tests cover meaningful surface area.
# A single test file would otherwise pull average coverage to ~0% and fail
# the default gate. Re-enable once test coverage is broad.
# ──────────────────────────────────────────────
sonar.coverage.exclusions=src/**/*

# NOTE: When you introduce broad tests:
# 1. Remove sonar.coverage.exclusions line above
# 2. Add: sonar.javascript.lcov.reportPaths=coverage/lcov.info
# 3. Provide a real projectKey / organization or pass via CLI args / secrets
# 4. Flip sonar.qualitygate.wait to `true` to enforce the gate

# ──────────────────────────────────────────────
# Issue ignores — silence rules that produce noise without real safety value
# in this codebase. Twenty-eight slots, one rule per slot.
#
# Rule references (sonar.io/javascript-rules):
#   typescript:S125    Sections of code should not be commented out
#   typescript:S107    Functions should not have too many parameters
#   typescript:S1117   Variable shadowing
#   typescript:S1135   "TODO" comments should be resolved
#   typescript:S1192   String literals should not be duplicated
#   typescript:S1481   Unused local variables (ESLint owns this)
#   typescript:S1854   Dead stores
#   typescript:S2486   Catch clauses without action
#   typescript:S2589   Boolean expressions should not be gratuitous
#   typescript:S2737   "catch" clauses should do more than rethrow
#   typescript:S3358   Nested ternary operators
#   typescript:S3776   Cognitive complexity of functions
#   typescript:S4123   "await" should only be used with promises
#   typescript:S4144   Functions should not have identical implementations
#   typescript:S6478   No nested components / arrow functions in JSX
#   typescript:S6479   No array index in React keys
#   typescript:S6535   Unnecessary string escapes
#   typescript:S6544   no-misused-promises (async event handlers in JSX)
#   typescript:S6571   Redundant `any` usage
#   typescript:S6582   Prefer optional chaining
#   typescript:S6594   Prefer .exec() over .match()
#   typescript:S6606   Prefer nullish coalescing
#   typescript:S6660   Useless else after return
#   typescript:S6661   Prefer .at()
#   typescript:S6749   Empty JSX/HTML elements
#   typescript:S6759   Component props should be readonly
#   typescript:S6841   tabIndex usage
#   typescript:S6852   Non-interactive elements with click handlers
# ──────────────────────────────────────────────
sonar.issue.ignore.multicriteria=\
  e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,\
  e11,e12,e13,e14,e15,e16,e17,e18,e19,e20,\
  e21,e22,e23,e24,e25,e26,e27,e28

# Commented-out code — placeholders/feature toggles are common in active dev
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S125
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*

# Cognitive complexity — high in form validation, mappers, and filter builders;
# refactoring without behavior change is risky.
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*

# Array index in React keys — used intentionally for stable, non-reordering lists
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S6479
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*

# `any` is acceptable across API boundaries where backend shape is dynamic
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S6571
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*

# Nullish coalescing migration — let TS lint handle this, not Sonar
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S6606
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*

# Readonly props — React props are conventionally not declared readonly
sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S6759
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*

# Inline JSX components — common in render props and conditional sections
sonar.issue.ignore.multicriteria.e7.ruleKey=typescript:S6478
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*

# Dead stores — false positives on hook initial values, defensive copies
sonar.issue.ignore.multicriteria.e8.ruleKey=typescript:S1854
sonar.issue.ignore.multicriteria.e8.resourceKey=**/*

# Empty catch — used as best-effort fire-and-forget (telemetry, side-effects)
sonar.issue.ignore.multicriteria.e9.ruleKey=typescript:S2486
sonar.issue.ignore.multicriteria.e9.resourceKey=**/*

# Unnecessary escapes — prettier handles these consistently already
sonar.issue.ignore.multicriteria.e10.ruleKey=typescript:S6535
sonar.issue.ignore.multicriteria.e10.resourceKey=**/*

# Duplicate string literals — Tailwind class strings and i18n keys collide here
sonar.issue.ignore.multicriteria.e11.ruleKey=typescript:S1192
sonar.issue.ignore.multicriteria.e11.resourceKey=**/*

# Too many parameters — form/section components legitimately accept many props
sonar.issue.ignore.multicriteria.e12.ruleKey=typescript:S107
sonar.issue.ignore.multicriteria.e12.resourceKey=**/*

# Nested ternaries — common in JSX conditional rendering
sonar.issue.ignore.multicriteria.e13.ruleKey=typescript:S3358
sonar.issue.ignore.multicriteria.e13.resourceKey=**/*

# TODO comments — tracked elsewhere
sonar.issue.ignore.multicriteria.e14.ruleKey=typescript:S1135
sonar.issue.ignore.multicriteria.e14.resourceKey=**/*

# Unused locals — ESLint owns this, Sonar produces duplicates
sonar.issue.ignore.multicriteria.e15.ruleKey=typescript:S1481
sonar.issue.ignore.multicriteria.e15.resourceKey=**/*

# Variable shadowing — common in callbacks (e.g. `.map((item) => …)`)
sonar.issue.ignore.multicriteria.e16.ruleKey=typescript:S1117
sonar.issue.ignore.multicriteria.e16.resourceKey=**/*

# Gratuitous boolean expressions — false positives on optional chaining
sonar.issue.ignore.multicriteria.e17.ruleKey=typescript:S2589
sonar.issue.ignore.multicriteria.e17.resourceKey=**/*

# Catch only rethrows — used for typed re-throw + sentry breadcrumb patterns
sonar.issue.ignore.multicriteria.e18.ruleKey=typescript:S2737
sonar.issue.ignore.multicriteria.e18.resourceKey=**/*

# `await` on non-promise — false positives on overloaded return types
sonar.issue.ignore.multicriteria.e19.ruleKey=typescript:S4123
sonar.issue.ignore.multicriteria.e19.resourceKey=**/*

# Identical function bodies — common in CRUD/filter handlers
sonar.issue.ignore.multicriteria.e20.ruleKey=typescript:S4144
sonar.issue.ignore.multicriteria.e20.resourceKey=**/*

# Prefer optional chaining — codemod, not a correctness issue
sonar.issue.ignore.multicriteria.e21.ruleKey=typescript:S6582
sonar.issue.ignore.multicriteria.e21.resourceKey=**/*

# Prefer .exec() over .match() — stylistic, not correctness
sonar.issue.ignore.multicriteria.e22.ruleKey=typescript:S6594
sonar.issue.ignore.multicriteria.e22.resourceKey=**/*

# Useless else after return — stylistic
sonar.issue.ignore.multicriteria.e23.ruleKey=typescript:S6660
sonar.issue.ignore.multicriteria.e23.resourceKey=**/*

# Prefer .at() — codemod
sonar.issue.ignore.multicriteria.e24.ruleKey=typescript:S6661
sonar.issue.ignore.multicriteria.e24.resourceKey=**/*

# Empty JSX/HTML elements — used as layout spacers
sonar.issue.ignore.multicriteria.e25.ruleKey=typescript:S6749
sonar.issue.ignore.multicriteria.e25.resourceKey=**/*

# tabIndex usage — needed for keyboard-focusable Radix/shadcn primitives
sonar.issue.ignore.multicriteria.e26.ruleKey=typescript:S6841
sonar.issue.ignore.multicriteria.e26.resourceKey=**/*

# Click handlers on non-interactive elements — wraps Radix triggers/portals
sonar.issue.ignore.multicriteria.e27.ruleKey=typescript:S6852
sonar.issue.ignore.multicriteria.e27.resourceKey=**/*

# Async event handlers in JSX — react-hook-form / onSubmit pattern
sonar.issue.ignore.multicriteria.e28.ruleKey=typescript:S6544
sonar.issue.ignore.multicriteria.e28.resourceKey=**/*
