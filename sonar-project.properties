sonar.projectKey=REPLACE_WITH_PROJECT_KEY
sonar.organization=REPLACE_WITH_ORG

# ──────────────────────────────────────────────
# Sources
# ──────────────────────────────────────────────
sonar.sources=src
sonar.sourceEncoding=UTF-8

# ──────────────────────────────────────────────
# Quality Gate — do not block CI on the gate result.
# CI status reflects build/test/lint only; Sonar is informational.
# Flip to `true` once tests + coverage land and the team commits to the gate.
# ──────────────────────────────────────────────
sonar.qualitygate.wait=false

# ──────────────────────────────────────────────
# JavaScript/TypeScript runtime hints
# ──────────────────────────────────────────────
sonar.javascript.environments=browser,node,jest

# ──────────────────────────────────────────────
# Analysis exclusions — files completely ignored by SonarCloud
# ──────────────────────────────────────────────
sonar.exclusions=\
  **/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__tests__/**,\
  **/*.d.ts,\
  **/*.stories.ts,**/*.stories.tsx,**/*storybook*/**,\
  **/*.config.js,**/*.config.mjs,**/*.config.ts,\
  next.config.ts,postcss.config.mjs,tailwind.config.js,vitest.config.ts,eslint.config.mjs,\
  .next/**,build/**,dist/**,coverage/**,\
  node_modules/**,\
  scripts/**,\
  **/constants/common/districts.ts,\
  **/constants/common/wards.ts,\
  **/constants/common/provinces.ts,\
  src/mock/**,\
  src/messages/**,\
  src/examples/**,\
  public/**

# ──────────────────────────────────────────────
# Copy-Paste Detection (CPD) exclusions
# These files have intentionally repetitive structures (data tables,
# parallel form sections, type definitions) that are NOT copy-paste bugs.
# ──────────────────────────────────────────────
sonar.cpd.exclusions=\
  **/constants/**,\
  src/mock/**,\
  src/messages/**,\
  src/examples/**,\
  src/api/types/**,\
  **/createPostSections/**,\
  **/updatePostSections/**,\
  **/*.constants.ts,**/*.constants.tsx,\
  **/index.colors.tsx

# ──────────────────────────────────────────────
# Coverage — disabled until unit tests are introduced
# ──────────────────────────────────────────────
sonar.coverage.exclusions=src/**/*

# NOTE: When you introduce tests:
# 1. Remove sonar.coverage.exclusions line above
# 2. Add: sonar.javascript.lcov.reportPaths=coverage/lcov.info
# 3. Provide a real projectKey / organization or pass via CLI args / secrets
# 4. Flip sonar.qualitygate.wait to `true` to enforce the gate

# ──────────────────────────────────────────────
# Issue ignores — silence rules that produce noise without real safety value
# in this codebase. Ten slots, one rule per slot.
#
# Rule references:
#   typescript:S125    Sections of code should not be commented out
#   typescript:S3776   Cognitive Complexity of functions
#   typescript:S6479   No array index in React keys
#   typescript:S6571   Redundant `any` usage
#   typescript:S6606   Prefer nullish coalescing
#   typescript:S6759   Component props should be readonly
#   typescript:S6478   No nested components / arrow functions in JSX
#   typescript:S1854   Dead stores
#   typescript:S2486   Catch clauses without action
#   typescript:S6535   Unnecessary string escapes
# ──────────────────────────────────────────────
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10

# Commented-out code — placeholders/feature toggles are common in active dev
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S125
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*

# Cognitive complexity — high in form validation, mappers, and filter builders;
# refactoring without behavior change is risky. Restrict to noisy areas.
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=src/components/organisms/**

# Array index in React keys — used intentionally for stable, non-reordering lists
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S6479
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*

# `any` is acceptable in API type boundaries where backend shape is dynamic
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S6571
sonar.issue.ignore.multicriteria.e4.resourceKey=src/api/types/**

# Nullish coalescing migration — let TS lint handle this, not Sonar
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S6606
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*

# Readonly props — React props are conventionally not declared readonly
sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S6759
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*

# Inline JSX components — common in render props, conditional sections
sonar.issue.ignore.multicriteria.e7.ruleKey=typescript:S6478
sonar.issue.ignore.multicriteria.e7.resourceKey=src/components/**

# Dead stores — false positives on hook initial values, defensive copies
sonar.issue.ignore.multicriteria.e8.ruleKey=typescript:S1854
sonar.issue.ignore.multicriteria.e8.resourceKey=**/*

# Empty catch — used as best-effort fire-and-forget (telemetry, side-effects)
sonar.issue.ignore.multicriteria.e9.ruleKey=typescript:S2486
sonar.issue.ignore.multicriteria.e9.resourceKey=**/*

# Unnecessary escapes — prettier handles these consistently already
sonar.issue.ignore.multicriteria.e10.ruleKey=typescript:S6535
sonar.issue.ignore.multicriteria.e10.resourceKey=**/*
