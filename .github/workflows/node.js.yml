name: Node.js CI

on:
  push:
    branches: ['main']
  pull_request:
    # Run on all branches targeting any base (default). Remove filter to analyze every PR.
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Run Linter
        run: npm run lint --if-present

  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Build
        run: npm run build --if-present
      - name: Test
        run: npm run test --if-present

  sonar-analysis:
    name: SonarCloud Analysis
    # Runs in parallel with build-and-test and never blocks CI:
    # Sonar findings should be reviewed in the SonarCloud dashboard, not gate merges.
    # Flip `continue-on-error` to false once tests + coverage land and the team
    # commits to enforcing the quality gate.
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarCloud to get blame info

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Only override projectKey & organization — all other settings
          # are read from sonar-project.properties (single source of truth).
          # `qualitygate.wait=false` keeps the scan informational; the result
          # is visible on the SonarCloud dashboard but does not block CI.
          args: >-
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.qualitygate.wait=false
